
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--surface-0);color:var(--text-primary)}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
#app{max-width:480px;margin:0 auto;padding:0 0 72px}
.topbar{background:#1F4E78;color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;top:0;z-index:10}
.topbar h1{font-size:16px;font-weight:600;flex:1}
.back-btn{background:rgba(255,255,255,0.15);border:none;color:#fff;padding:6px 10px;border-radius:6px;font-size:13px;cursor:pointer}
.search-wrap{padding:12px 16px;background:var(--surface-1);border-bottom:0.5px solid var(--border)}
.search-wrap input{width:100%;padding:10px 14px;border:0.5px solid var(--border-strong);border-radius:8px;font-size:15px;background:var(--surface-2);color:var(--text-primary)}
.search-wrap input:focus{outline:none;border-color:#1F4E78}
.section-label{padding:10px 16px 4px;font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--text-muted);text-transform:uppercase}
.mrow{display:flex;align-items:center;padding:12px 16px;border-bottom:0.5px solid var(--border);cursor:pointer;gap:12px;background:var(--surface-2)}
.mrow:active{background:var(--surface-1)}
.mthumb{width:42px;height:42px;border-radius:8px;object-fit:cover;border:0.5px solid var(--border);flex-shrink:0}
.mbadge{width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.mbadge.truck{background:#E6F1FB;color:#185FA5}
.mbadge.equipment{background:#EAF3DE;color:#3B6D11}
.minfo{flex:1;min-width:0}
.mid{font-size:13px;font-weight:600}
.mdesc{font-size:12px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mchevron{color:var(--text-muted);font-size:20px;line-height:1}
.ldot{width:7px;height:7px;border-radius:50%;background:#639922;flex-shrink:0}
.view{display:none}
.view.active{display:block}
.ph{background:#1F4E78;color:#fff;padding:0 0 16px}
.ph-img-wrap{width:100%;height:200px;background:#0d3459;position:relative;overflow:hidden}
.ph-img-wrap img{width:100%;height:100%;object-fit:cover}
.ph-no-img{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:rgba(255,255,255,0.45);font-size:13px}
.ph-no-img i{font-size:40px}
.ph-add-photo{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,0.55);color:#fff;border:none;border-radius:20px;padding:6px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px}
.ph-info{padding:14px 16px 0}
.ph-fleet{font-size:26px;font-weight:700;letter-spacing:-.02em}
.ph-name{font-size:15px;opacity:.85;margin-top:2px}
.ph-meta{font-size:12px;opacity:.6;margin-top:3px}
.ph-photos-strip{display:flex;gap:8px;overflow-x:auto;padding:12px 16px 0;scrollbar-width:none}
.ph-photos-strip::-webkit-scrollbar{display:none}
.ph-strip-thumb{width:60px;height:60px;border-radius:8px;object-fit:cover;flex-shrink:0;border:0.5px solid rgba(255,255,255,0.3);cursor:pointer}
.ph-strip-add{width:60px;height:60px;border-radius:8px;border:1.5px dashed rgba(255,255,255,0.4);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;color:rgba(255,255,255,0.6);font-size:22px}
.toast{background:#27500A;color:#fff;padding:12px 16px;margin:0 16px 12px;border-radius:10px;font-size:14px;font-weight:500;display:none;align-items:center;gap:8px}
.lform{padding:16px}
.fc{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.fc h3{font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em}
.field{margin-bottom:12px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:13px;color:var(--text-secondary);margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;border:0.5px solid var(--border-strong);border-radius:8px;font-size:15px;background:var(--surface-2);color:var(--text-primary);font-family:inherit}
.field input:focus,.field textarea:focus{outline:none;border-color:#1F4E78;border-width:1.5px}
.field textarea{min-height:80px;resize:vertical}
.fuelg{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.fb{padding:8px 4px;border:0.5px solid var(--border-strong);border-radius:6px;background:var(--surface-2);color:var(--text-secondary);font-size:12px;cursor:pointer;text-align:center}
.fb.sel{background:#1F4E78;color:#fff;border-color:#1F4E78}
.sbtn{width:100%;padding:14px;background:#1F4E78;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;margin-top:4px}
.sbtn:active{opacity:.85}
.logs-sec{padding:0 16px 16px}
.logs-sec h3{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.lentry{background:var(--surface-2);border:0.5px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.leh{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ldate{font-size:12px;color:var(--text-muted)}
.lby{font-size:12px;font-weight:500;color:var(--text-secondary)}
.lread{font-size:15px;font-weight:600;margin-bottom:3px}
.lloc{font-size:13px;color:var(--text-secondary)}
.lissue{font-size:13px;color:#A32D2D;margin-top:6px;padding-top:6px;border-top:0.5px solid var(--border)}
.lissue-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.no-logs{font-size:13px;color:var(--text-muted);text-align:center;padding:20px 0}
.master-wrap{padding:16px}
.master-wrap h2{font-size:18px;font-weight:500;margin-bottom:4px}
.master-sub{font-size:13px;color:var(--text-secondary);margin-bottom:16px}
.me{background:var(--surface-2);border:0.5px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer}
.me:active{background:var(--surface-1)}
.met{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.mefl{font-size:14px;font-weight:600}
.medt{font-size:12px;color:var(--text-muted)}
.memac{font-size:12px;color:var(--text-secondary)}
.merd{font-size:13px;margin-top:4px}
.ipill{display:inline-block;background:#FCEBEB;color:#A32D2D;border-radius:20px;font-size:11px;font-weight:600;padding:2px 8px;margin-top:6px}
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface-2);border-top:0.5px solid var(--border);display:flex;z-index:10}
.tab{flex:1;padding:10px 8px 8px;text-align:center;cursor:pointer;font-size:11px;color:var(--text-muted);border:none;background:none}
.tab i{display:block;font-size:22px;margin-bottom:2px}
.tab.active{color:#1F4E78}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:14px}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:100;align-items:center;justify-content:center;flex-direction:column}
.lightbox.open{display:flex}
.lightbox img{max-width:95vw;max-height:80vh;border-radius:8px;object-fit:contain}

.lightbox-del{margin-top:16px;background:rgba(220,50,50,0.8);color:#fff;border:none;padding:8px 20px;border-radius:20px;font-size:13px;cursor:pointer}
input[type=file]{display:none}
</style>

<h2 class="sr-only">Fleet tracker with photos — log hours, location, issues, and photos for each machine</h2>

<div id="app">
  <div id="view-list" class="view active">
    <div class="topbar">
      <h1>Fleet Tracker</h1>
    </div>
    <div class="search-wrap"><input id="search" placeholder="Search fleet #, make, or model..." oninput="filterMachines(this.value)"></div>
    <div id="mlist"></div>
  </div>

  <div id="view-profile" class="view">
    <div class="topbar">
      <button class="back-btn" onclick="showView('list')"><i class="ti ti-arrow-left" aria-hidden="true"></i> Back</button>
      <h1 id="ptitle">Machine</h1>
    </div>
    <div class="ph">
      <div class="ph-img-wrap" id="main-img-wrap">
        <div class="ph-no-img" id="no-img-placeholder"><i class="ti ti-camera-off" aria-hidden="true"></i><span>No photos yet</span></div>
        <img id="main-photo" src="" alt="Machine photo" style="display:none">
        <button class="ph-add-photo" onclick="document.getElementById('photo-input').click()"><i class="ti ti-camera" aria-hidden="true"></i> Add photo</button>
      </div>
      <div class="ph-info">
        <div class="ph-fleet" id="ph-fleet"></div>
        <div class="ph-name" id="ph-name"></div>
        <div class="ph-meta" id="ph-meta"></div>
      </div>
      <div class="ph-photos-strip" id="photos-strip"></div>
    </div>
    <input type="file" id="photo-input" accept="image/*" multiple onchange="handlePhotos(this)">
    <div class="toast" id="toast"><i class="ti ti-check" aria-hidden="true"></i> <span id="toast-msg">Saved</span></div>
    <div class="lform">
      <div class="fc">
        <h3>Current reading</h3>
        <div class="field"><label id="rlabel">Hours / miles</label><input type="number" id="f-reading" placeholder="e.g. 1450"></div>
        <div class="field"><label>Date</label><input type="date" id="f-date"></div>
      </div>
      <div class="fc">
        <h3>Location</h3>
        <div class="field"><label>Where is it right now?</label><input type="text" id="f-loc" placeholder="Job site, yard, shop..."></div>
      </div>
      <div class="fc">
        <h3>Fuel level</h3>
        <div class="fuelg">
          <button class="fb" onclick="selFuel(this,'E')">E</button>
          <button class="fb" onclick="selFuel(this,'1/4')">1/4</button>
          <button class="fb" onclick="selFuel(this,'1/2')">1/2</button>
          <button class="fb" onclick="selFuel(this,'3/4')">3/4</button>
          <button class="fb" onclick="selFuel(this,'F')">F</button>
        </div>
      </div>
      <div class="fc">
        <h3>Issues or damage</h3>
        <div class="field"><label>Describe problems (leave blank if none)</label><textarea id="f-issues" placeholder="Any issues, leaks, damage, needed repairs..."></textarea></div>
      </div>
      <div class="fc">
        <h3>Reported by</h3>
        <div class="field"><label>Your name</label><input type="text" id="f-reporter" placeholder="Your name"></div>
      </div>
      <button class="sbtn" onclick="submitLog()">Save log entry</button>
    </div>
    <div class="logs-sec">
      <h3>Previous logs</h3>
      <div id="mlogs"></div>
    </div>
  </div>

  <div id="view-master" class="view">
    <div class="topbar"><h1>All logs</h1></div>
    <div class="master-wrap">
      <h2>Master log</h2>
      <p class="master-sub">All entries from every machine, newest first.</p>
      <div id="alllogs"></div>
    </div>
  </div>
</div>

<div class="tabbar">
  <button class="tab active" id="tab-fleet" onclick="showView('list')"><i class="ti ti-truck" aria-hidden="true"></i>Fleet</button>
  <button class="tab" id="tab-logs" onclick="showView('master')"><i class="ti ti-clipboard-list" aria-hidden="true"></i>All logs</button>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()" aria-label="Close photo"><i class="ti ti-x" aria-hidden="true"></i></button>
  <img id="lb-img" src="" alt="Full size machine photo">
  <button class="lightbox-del" onclick="deletePhoto()"><i class="ti ti-trash" aria-hidden="true"></i> Remove photo</button>
</div>

      res(c.toDataURL('image/jpeg',q));
    };
    img.src=dataUrl;
  });
}

async function load(){
  try{const r=await window.storage.get('fleet_logs');if(r&&r.value)allLogs=JSON.parse(r.value);}catch(e){}
  try{const r=await window.storage.get('fleet_photos');if(r&&r.value)allPhotos=JSON.parse(r.value);}catch(e){}
}

async function saveLogs(){try{await window.storage.set('fleet_logs',JSON.stringify(allLogs));}catch(e){}}
async function savePhotos(){try{await window.storage.set('fleet_photos',JSON.stringify(allPhotos));}catch(e){}}

function showToast(msg){
  const t=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  t.style.display='flex';
  setTimeout(()=>t.style.display='none',3000);
}

function showView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  if(v==='list')document.getElementById('tab-fleet').classList.add('active');
  if(v==='master'){document.getElementById('tab-logs').classList.add('active');renderMaster();}
}

function getThumb(id){
  const photos=allPhotos[id]||[];
  return photos.length?photos[0]:null;
}

function renderMachineList(machines){
  const el=document.getElementById('mlist');
  let html='',lastCat='';
  machines.forEach(m=>{
    const cat=m.cat==='truck'?'Trucks':'Heavy Equipment';
    if(cat!==lastCat){html+=`<div class="section-label">${cat}</div>`;lastCat=cat;}
    const logs=allLogs[m.id]||[];
    const thumb=getThumb(m.id);
    const desc=[m.make,m.model,m.type,m.year].filter(Boolean).join(' · ');
    const thumbHtml=thumb
      ?`<img class="mthumb" src="${thumb}" alt="${m.id}">`
      :`<div class="mbadge ${m.cat}">${m.cat==='truck'?'TRK':'EQP'}</div>`;
    html+=`<div class="mrow" onclick="openMachine('${m.id}')">
      ${thumbHtml}
      <div class="minfo"><div class="mid">${m.id}${m.operator?' — '+m.operator:''}</div><div class="mdesc">${desc}</div></div>
      ${logs.length?'<div class="ldot"></div>':''}
      <div class="mchevron">›</div>
    </div>`;
  });
  if(!machines.length)html='<div class="empty-state">No machines match your search.</div>';
  el.innerHTML=html;
}

function filterMachines(q){
  q=q.toLowerCase();
  renderMachineList(MACHINES.filter(m=>
    m.id.toLowerCase().includes(q)||m.make.toLowerCase().includes(q)||
    m.model.toLowerCase().includes(q)||m.type.toLowerCase().includes(q)||
    m.operator.toLowerCase().includes(q)
  ));
}

function openMachine(id){
  cur=MACHINES.find(m=>m.id===id);
  if(!cur)return;
  document.getElementById('ptitle').textContent=id;
  document.getElementById('ph-fleet').textContent=id;
  document.getElementById('ph-name').textContent=[cur.make,cur.model].filter(Boolean).join(' ');
  document.getElementById('ph-meta').textContent=[cur.type,cur.year].filter(Boolean).join(' · ')+(cur.operator?' · '+cur.operator:'');
  document.getElementById('rlabel').textContent=cur.cat==='truck'?'Current mileage (odometer)':'Current hours (hour meter)';
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
  ['f-reading','f-loc','f-issues','f-reporter'].forEach(id=>{document.getElementById(id).value='';});
  selFuelVal='';
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('sel'));
  document.getElementById('toast').style.display='none';
  renderPhotos();
  renderMachineLogs(id);
  showView('profile');
}

function renderPhotos(){
  const photos=allPhotos[cur.id]||[];
  const main=document.getElementById('main-photo');
  const noImg=document.getElementById('no-img-placeholder');
  if(photos.length){
    main.src=photos[0];main.style.display='block';noImg.style.display='none';
  }else{
    main.style.display='none';noImg.style.display='flex';
  }
  const strip=document.getElementById('photos-strip');
  let html='';
  photos.forEach((p,i)=>{
    html+=`<img class="ph-strip-thumb" src="${p}" alt="Photo ${i+1}" onclick="openLightbox(${i})">`;
  });
  html+=`<div class="ph-strip-add" onclick="document.getElementById('photo-input').click()" title="Add more photos"><i class="ti ti-plus" aria-hidden="true"></i></div>`;
  strip.innerHTML=html;
}

async function handlePhotos(input){
  if(!cur||!input.files.length)return;
  if(!allPhotos[cur.id])allPhotos[cur.id]=[];
  const MAX=4096,Q=0.75;
  for(const file of input.files){
    const reader=new FileReader();
    await new Promise(res=>{reader.onload=e=>{res(e.target.result);};reader.readAsDataURL(file);});
    const compressed=await compress(reader.result,MAX,MAX,Q);
    allPhotos[cur.id].push(compressed);
  }
  await savePhotos();
  renderPhotos();
  renderMachineList(MACHINES);
  showToast(`${input.files.length===1?'Photo':'Photos'} added`);
  input.value='';
}

function openLightbox(idx){
  lbPhotoIdx=idx;
  const photos=allPhotos[cur.id]||[];
  document.getElementById('lb-img').src=photos[idx];
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox(){document.getElementById('lightbox').classList.remove('open');lbPhotoIdx=null;}

async function deletePhoto(){
  if(lbPhotoIdx===null||!cur)return;
  allPhotos[cur.id].splice(lbPhotoIdx,1);
  await savePhotos();
  closeLightbox();
  renderPhotos();
  renderMachineList(MACHINES);
  showToast('Photo removed');
}

function selFuel(btn,val){
  selFuelVal=val;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}

async function submitLog(){
  if(!cur)return;
  const entry={ts:new Date().toISOString(),date:document.getElementById('f-date').value,reading:document.getElementById('f-reading').value,location:document.getElementById('f-loc').value,fuel:selFuelVal,issues:document.getElementById('f-issues').value,reporter:document.getElementById('f-reporter').value};
  if(!allLogs[cur.id])allLogs[cur.id]=[];
  allLogs[cur.id].unshift(entry);
  await saveLogs();
  ['f-reading','f-loc','f-issues','f-reporter'].forEach(id=>{document.getElementById(id).value='';});
  selFuelVal='';document.querySelectorAll('.fb').forEach(b=>b.classList.remove('sel'));
  renderMachineLogs(cur.id);renderMachineList(MACHINES);
  showToast('Log entry saved');
}

function renderMachineLogs(id){
  const logs=allLogs[id]||[];
  const el=document.getElementById('mlogs');
  if(!logs.length){el.innerHTML='<div class="no-logs">No logs yet for this machine.</div>';return;}
  el.innerHTML=logs.map(l=>`
    <div class="lentry">
      <div class="leh"><span class="ldate">${l.date||l.ts.slice(0,10)}</span><span class="lby">${l.reporter||'—'}</span></div>
      ${l.reading?`<div class="lread">${Number(l.reading).toLocaleString()} ${cur.cat==='truck'?'mi':'hrs'}${l.fuel?' · Fuel: '+l.fuel:''}</div>`:''}
      ${l.location?`<div class="lloc"><i class="ti ti-map-pin" style="font-size:13px;vertical-align:-1px" aria-hidden="true"></i> ${l.location}</div>`:''}
      ${l.issues?`<div class="lissue"><div class="lissue-lbl">Issues reported</div>${l.issues}</div>`:''}
    </div>`).join('');
}

function renderMaster(){
  const all=[];
  Object.entries(allLogs).forEach(([id,logs])=>{
    const m=MACHINES.find(x=>x.id===id);
    logs.forEach(l=>all.push({...l,machineId:id,machine:m}));
  });
  all.sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  const el=document.getElementById('alllogs');
  if(!all.length){el.innerHTML='<div class="empty-state">No logs submitted yet.<br>Go to Fleet and tap a machine to log it.</div>';return;}
  el.innerHTML=all.map(l=>{
    const m=l.machine;
    const desc=m?[m.make,m.model].filter(Boolean).join(' '):'';
    return`<div class="me" onclick="openMachine('${l.machineId}')">
      <div class="met"><span class="mefl">${l.machineId}</span><span class="medt">${l.date||l.ts.slice(0,10)}</span></div>
      <div class="memac">${desc}${l.reporter?' · '+l.reporter:''}</div>
      ${l.reading?`<div class="merd">${Number(l.reading).toLocaleString()} ${m&&m.cat==='truck'?'mi':'hrs'}${l.fuel?' · Fuel: '+l.fuel:''}${l.location?' · '+l.location:''}</div>`:''}
      ${l.issues?'<span class="ipill"><i class="ti ti-alert-triangle" style="font-size:11px;vertical-align:-1px" aria-hidden="true"></i> Issue reported</span>':''}
    </div>`;
  }).join('');
}

document.getElementById('lightbox').addEventListener('click',function(e){if(e.target===this)closeLightbox();});
load().then(()=>renderMachineList(MACHINES));
</script>
